steps:
  # Paso 1: Construir la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:latest'
      - '.'

  # Paso 2: Subir la imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:latest'

  # Paso 3: Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'scribe-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/scribe-mundial/scribe-repo/scribe-backend:latest'

